<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview</title>

    <link rel="stylesheet" href="styling/interview.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>AI Interview Simulator</h1>
            <p>Practice interviews and improve your confidence.</p>
        </div>

        <div class="interview-card">

            <div class="question-box">

                <h2 id="questionNumber">Question 1</h2>

                <p id="question">
                    Explain the difference between Machine Learning and Deep Learning.
                </p>

            </div>

            <div class="answer-box">

                <textarea
                    id="answer"
                    placeholder="Type your answer here..."></textarea>

            </div>

            <div class="buttons">

                <button id="submitBtn">
                    Submit Answer
                </button>

                <button id="nextBtn">
                    Next Question
                </button>

            </div>

        </div>

        <div class="feedback-card">

            <h2>AI Feedback</h2>

            <p id="feedback">
                Your feedback will appear here after submitting.
            </p>

        </div>

        <div class="score-card">

            <h2>Interview Score</h2>

            <div id="score">
                0 / 100
            </div>

        </div>

    </div>

    <script src="js/interview.js"></script>

</body>

</html>
