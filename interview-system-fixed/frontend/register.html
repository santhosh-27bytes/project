<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPilot AI - Register</title>

    <link rel="stylesheet" href="styling/register.css">
</head>

<body>

    <div class="container">

        <div class="left-section">

            <h1>Join CareerPilot AI</h1>

            <p>
                Create your account and start your AI-powered
                career journey today.
            </p>

        </div>

        <div class="right-section">

            <div class="register-card">

                <h2>Create Account</h2>

                <form id="registerForm">

                    <input
                        type="text"
                        id="fullname"
                        placeholder="Full Name"
                        required>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                    <input
                        type="text"
                        id="college"
                        placeholder="College Name"
                        required>

                    <input
                        type="text"
                        id="department"
                        placeholder="Department"
                        required>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                    <button type="submit">
                        Register
                    </button>

                </form>

                <p class="login-text">
                    Already have an account?
                    <a href="login.html">
                        Login
                    </a>
                </p>

            </div>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>

</html>
